  <rect x="270" y="115" width="130" height="52" rx="2" fill="#d0ee89"/>
  <text x="335" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#262d1e">Approved</text>

  <rect x="460" y="115" width="140" height="52" rx="2" fill="#3f5b1e"/>

<svg width="900" height="380" viewBox="0 0 900 380" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#d4d2c6"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0L7 3L0 6Z" fill="#686c62"/></marker>
  </defs>
  <rect width="900" height="380" rx="4" fill="#f6f5ee"/>
  <rect width="900" height="380" rx="4" fill="url(#dots)"/>

  <g stroke="#686c62" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="3 4">
    <line x1="160" y1="64" x2="160" y2="366"/>
    <line x1="460" y1="64" x2="460" y2="366"/>
    <line x1="760" y1="64" x2="760" y2="366"/>
  </g>

  <rect x="90" y="20" width="140" height="44" rx="2" fill="#ffffff"/>
  <text x="160" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#262d1e">Operator</text>
  <rect x="390" y="20" width="140" height="44" rx="2" fill="#3f5b1e"/>
  <text x="460" y="47" text-anchor="middle" font-size="13" font-weight="700" fill="#f6f5ee">Forest</text>
  <rect x="690" y="20" width="140" height="44" rx="2" fill="#ffffff"/>
  <text x="760" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#262d1e">Approver</text>

  <!-- pending note -->
  <rect x="396" y="120" width="128" height="26" rx="2" fill="#ece9e0"/>
  <text x="460" y="137" text-anchor="middle" font-size="11" fill="#686c62">status = pending</text>

  <!-- alt frame -->
  <rect x="360" y="232" width="240" height="86" rx="2" fill="none" stroke="#686c62" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="360" y="232" width="42" height="18" rx="2" fill="#686c62"/>
  <text x="381" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#f6f5ee">alt</text>

  <g stroke="#686c62" stroke-opacity="0.8" stroke-width="1.5" fill="none">
    <line x1="160" y1="104" x2="460" y2="104" marker-end="url(#arr)"/>
    <line x1="460" y1="184" x2="760" y2="184" marker-end="url(#arr)"/>
    <line x1="760" y1="216" x2="460" y2="216" stroke-dasharray="4 4" marker-end="url(#arr)"/>
    <path d="M460 264 H516 V282 H462" marker-end="url(#arr)"/>
    <path d="M460 296 H516 V310 H462" marker-end="url(#arr)"/>
    <line x1="460" y1="346" x2="160" y2="346" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  </g>
  <g font-size="12.5" fill="#262d1e" text-anchor="middle">
    <text x="310" y="98">trigger action</text>
    <text x="610" y="178">notify</text>
    <text x="610" y="210" fill="#686c62">approve / reject</text>
    <text x="524" y="260" text-anchor="start">approved → execute</text>
    <text x="524" y="306" text-anchor="start" fill="#686c62">rejected → cancel</text>
    <text x="310" y="340" fill="#686c62">result + audit entry</text>
  </g>
</svg>

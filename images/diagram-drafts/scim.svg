<svg width="760" height="360" viewBox="0 0 760 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#d4d2c6"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0L7 3L0 6Z" fill="#686c62"/></marker>
  </defs>
  <rect width="760" height="360" rx="4" fill="#f6f5ee"/>
  <rect width="760" height="360" rx="4" fill="url(#dots)"/>

  <!-- lifelines -->
  <g stroke="#686c62" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="3 4">
    <line x1="200" y1="64" x2="200" y2="346"/>
    <line x1="560" y1="64" x2="560" y2="346"/>
  </g>

  <!-- headers -->
  <rect x="130" y="20" width="140" height="44" rx="2" fill="#ffffff"/>
  <text x="200" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#262d1e">Identity provider</text>
  <rect x="490" y="20" width="140" height="44" rx="2" fill="#3f5b1e"/>
  <text x="560" y="47" text-anchor="middle" font-size="13" font-weight="700" fill="#f6f5ee">Forest SCIM API</text>

  <!-- messages -->
  <g stroke="#686c62" stroke-opacity="0.8" stroke-width="1.5" fill="none">
    <line x1="200" y1="104" x2="560" y2="104" marker-end="url(#arr)"/>
    <line x1="560" y1="140" x2="200" y2="140" stroke-dasharray="4 4" marker-end="url(#arr)"/>
    <line x1="200" y1="184" x2="560" y2="184" marker-end="url(#arr)"/>
    <line x1="560" y1="220" x2="200" y2="220" stroke-dasharray="4 4" marker-end="url(#arr)"/>
    <line x1="200" y1="264" x2="560" y2="264" marker-end="url(#arr)"/>
    <line x1="560" y1="300" x2="200" y2="300" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  </g>
  <g font-size="12.5" fill="#262d1e" text-anchor="middle">
    <text x="380" y="98">POST /Users — provision</text>
    <text x="380" y="134" fill="#686c62">201 Created</text>
    <text x="380" y="178">PATCH /Users/{id} — update</text>
    <text x="380" y="214" fill="#686c62">200 OK</text>
    <text x="380" y="258">DELETE /Users/{id} — deprovision</text>
    <text x="380" y="294" fill="#686c62">204 No Content</text>
  </g>
  <text x="380" y="336" text-anchor="middle" font-size="12" font-style="italic" fill="#686c62">Forest mirrors the IdP as source of truth</text>
</svg>

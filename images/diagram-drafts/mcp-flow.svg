<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d4d2c6"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L7 3L0 6Z" fill="#686c62"/>
    </marker>
    <marker id="ahG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L7 3L0 6Z" fill="#3f5b1e"/>
    </marker>
    <marker id="ahR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L7 3L0 6Z" fill="#e24322"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="400" rx="20" fill="#f6f5ee"/>
  <rect x="0" y="0" width="1200" height="400" rx="20" fill="url(#dots)"/>

  <!-- edges -->
  <g stroke-width="2" fill="none">
    <!-- AI -> MCP -->
    <line x1="232" y1="200" x2="296" y2="200" stroke="#686c62" marker-end="url(#ah)"/>
    <!-- MCP -> GATE -->
    <line x1="452" y1="200" x2="516" y2="200" stroke="#686c62" marker-end="url(#ah)"/>
    <!-- GATE -> BACK-END (allowed) -->
    <path d="M684 175 C 720 150, 730 138, 756 135" stroke="#3f5b1e" stroke-width="2.5" marker-end="url(#ahG)"/>
    <!-- GATE -> BLOCKED (denied) -->
    <path d="M684 228 C 720 255, 730 295, 756 305" stroke="#e24322" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahR)"/>
    <!-- BACK-END -> DATA -->
    <line x1="972" y1="125" x2="1026" y2="120" stroke="#686c62" marker-end="url(#ah)"/>
    <!-- BACK-END -> AUDIT (writes) -->
    <path d="M972 160 C 1000 195, 1005 215, 1026 226" stroke="#686c62" stroke-width="2" stroke-dasharray="2 4" marker-end="url(#ah)"/>
  </g>

  <!-- edge labels -->
  <g font-size="13" fill="#686c62">
    <text x="264" y="190" text-anchor="middle">request</text>
    <text x="712" y="150" fill="#3f5b1e" font-weight="600">allowed</text>
    <text x="700" y="285" fill="#e24322" font-weight="600">denied</text>
    <text x="1000" y="205" font-style="italic">writes</text>
  </g>

  <!-- AI agent -->
  <g>
    <rect x="60" y="160" width="172" height="80" rx="14" fill="#ffffff" stroke="#bab9a9" stroke-width="1.5"/>
    <circle cx="92" cy="200" r="13" fill="#e3f68b" stroke="#3f5b1e" stroke-width="1.5"/>
    <text x="92" y="205" text-anchor="middle" font-size="14">🤖</text>
    <text x="118" y="196" font-size="15" font-weight="600" fill="#262d1e">AI agent</text>
    <text x="118" y="216" font-size="12" fill="#686c62">Claude, Cursor…</text>
  </g>

  <!-- /mcp endpoint -->
  <g>
    <rect x="302" y="175" width="150" height="50" rx="25" fill="#ddf327" stroke="#3f5b1e" stroke-width="1.5"/>
    <text x="377" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#262d1e">/mcp endpoint</text>
  </g>

  <!-- permissions gate -->
  <g>
    <rect x="516" y="150" width="168" height="100" rx="16" fill="#262d1e"/>
    <text x="600" y="192" text-anchor="middle" font-size="15" font-weight="600" fill="#e3f68b">permissions</text>
    <text x="600" y="214" text-anchor="middle" font-size="15" font-weight="600" fill="#e3f68b">+ role</text>
  </g>

  <!-- Forest back-end (hero) -->
  <g>
    <rect x="756" y="90" width="216" height="92" rx="16" fill="#3f5b1e" stroke="#262d1e" stroke-width="2"/>
    <circle cx="788" cy="136" r="14" fill="#ddf327"/>
    <text x="788" y="142" text-anchor="middle" font-size="15">🌳</text>
    <text x="814" y="131" font-size="17" font-weight="700" fill="#f6f5ee">Forest back-end</text>
    <text x="814" y="153" font-size="12" fill="#d0ee89">your infrastructure</text>
  </g>

  <!-- blocked -->
  <g>
    <rect x="756" y="280" width="160" height="54" rx="14" fill="#ffffff" stroke="#e24322" stroke-width="1.8"/>
    <text x="836" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#e24322">⛔ blocked</text>
  </g>

  <!-- your data (cylinder) -->
  <g>
    <path d="M1030 92 v62 a45 11 0 0 0 90 0 v-62" fill="#ffffff" stroke="#bab9a9" stroke-width="1.5"/>
    <ellipse cx="1075" cy="92" rx="45" ry="11" fill="#ffffff" stroke="#bab9a9" stroke-width="1.5"/>
    <text x="1075" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#262d1e">your data</text>
  </g>

  <!-- audit log -->
  <g>
    <rect x="1030" y="200" width="160" height="58" rx="12" fill="#e9e6df" stroke="#686c62" stroke-width="1.5"/>
    <rect x="1030" y="200" width="6" height="58" rx="3" fill="#3f5b1e"/>
    <text x="1112" y="226" text-anchor="middle" font-size="14" font-weight="600" fill="#262d1e">📋 audit log</text>
    <text x="1112" y="244" text-anchor="middle" font-size="11" fill="#686c62">every action traced</text>
  </g>
</svg>

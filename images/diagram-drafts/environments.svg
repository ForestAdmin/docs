  </defs>
  <rect width="980" height="280" rx="4" fill="#f6f5ee"/>
  <rect width="980" height="280" rx="4" fill="url(#dots)"/>

  <rect x="40" y="50" width="360" height="200" rx="2" fill="#ece9e0"/>

    <path d="M145 152 V172" marker-end="url(#sq)"/>
    <path d="M220 197 H590" marker-end="url(#sq)"/>
    <path d="M220 122 H590" stroke-dasharray="4 4" marker-end="url(#sq)"/>
  </g>
  <g font-size="11.5" fill="#686c62" text-anchor="middle">

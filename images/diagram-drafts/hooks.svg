<svg width="1000" height="270" viewBox="0 0 1000 270" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#d4d2c6"/></pattern>
    <marker id="sq" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="0" markerUnits="userSpaceOnUse"><rect x="0.5" y="0.5" width="7" height="7" fill="#f6f5ee" stroke="#bcbcb4" stroke-width="1"/></marker>
  </defs>
  <rect width="1000" height="270" rx="4" fill="#f6f5ee"/>
  <rect width="1000" height="270" rx="4" fill="url(#dots)"/>

  <g stroke="#686c62" stroke-opacity="0.7" stroke-width="1.5" fill="none">
    <path d="M160 130 H210" marker-end="url(#sq)"/>
    <path d="M370 130 H420" marker-end="url(#sq)"/>
    <path d="M600 130 H650" marker-end="url(#sq)"/>
    <path d="M810 130 H860" marker-end="url(#sq)"/>
    <path d="M290 165 V200" stroke-dasharray="4 4" marker-end="url(#sq)"/>
  </g>
  <text x="300" y="188" font-size="12" fill="#686c62">throw</text>

  <g>
    <rect x="40" y="95" width="120" height="70" rx="2" fill="#ffffff"/>
    <text x="100" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#262d1e">Request</text>
  </g>
  <g>
    <rect x="210" y="95" width="160" height="70" rx="2" fill="#3f5b1e"/>
    <text x="290" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#f6f5ee">Before hook</text>
    <text x="290" y="145" text-anchor="middle" font-size="11" fill="#d0ee89">validate · mutate · abort</text>
  </g>
  <g>
    <rect x="420" y="95" width="180" height="70" rx="2" fill="#262d1e"/>
    <text x="510" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#e3f68b">collection operation</text>
    <text x="510" y="145" text-anchor="middle" font-size="11" fill="#e3f68b">List · Create · Update · Delete</text>
  </g>
  <g>
    <rect x="650" y="95" width="160" height="70" rx="2" fill="#3f5b1e"/>
    <text x="730" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#f6f5ee">After hook</text>
    <text x="730" y="145" text-anchor="middle" font-size="11" fill="#d0ee89">enrich · side-effects</text>
  </g>
  <g>
    <rect x="860" y="95" width="120" height="70" rx="2" fill="#ffffff"/>
    <text x="920" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#262d1e">Response</text>
  </g>
  <g>
    <rect x="210" y="200" width="160" height="44" rx="2" fill="#d9d9d9"/>
    <text x="290" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#686c62">aborted</text>
  </g>
</svg>
